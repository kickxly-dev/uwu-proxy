[build]
  publish = "public"
  command = "npm run build"

# Map /api/* to Netlify functions
[[redirects]]
  from = "/api/auth"
  to = "/.netlify/functions/auth"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth-codes"
  to = "/.netlify/functions/auth-codes"
  status = 200
  force = true

[[redirects]]
  from = "/api/ai"
  to = "/.netlify/functions/ai"
  status = 200
  force = true

[[redirects]]
  from = "/api/movies"
  to = "/.netlify/functions/movies"
  status = 200
  force = true

[[redirects]]
  from = "/api/chat/send"
  to = "/.netlify/functions/chat"
  status = 200
  force = true

[[redirects]]
  from = "/api/chat/stream"
  to = "https://ntfy.sh/uwuprx-chat/sse"
  status = 302
  force = true

[[redirects]]
  from = "/api/presence"
  to = "/.netlify/functions/presence"
  status = 200
  force = true

[[redirects]]
  from = "/api/presence/stream"
  to = "https://ntfy.sh/uwuprx-presence/sse"
  status = 302
  force = true

[[redirects]]
  from = "/api/games"
  to = "/.netlify/functions/games"
  status = 200
  force = true

[[redirects]]
  from = "/games/custom/:slug"
  to = "/.netlify/functions/game-file?slug=:slug"
  status = 200
  force = true

[[redirects]]
  from = "/bare/*"
  to = "/.netlify/functions/bare"
  status = 200
  force = true

# SW scope header
[[headers]]
  for = "/games/**"
  [headers.values]
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https: ws: wss: blob: data:; frame-src 'self' https: *; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: *; style-src 'self' 'unsafe-inline' https:; img-src 'self' https: data: blob:; font-src 'self' https: data:; connect-src 'self' https: ws: wss: *; media-src 'self' https: blob:"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/uv/sw.js"
  [headers.values]
    Service-Worker-Allowed = "/"
