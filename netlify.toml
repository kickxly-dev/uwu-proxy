[build]
  publish = "public"

# Route bare server requests to our Netlify Function
[[redirects]]
  from = "/bare/*"
  to = "/.netlify/functions/bare"
  status = 200
  force = true

[[redirects]]
  from = "/.netlify/functions/auth"
  to = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from = "/.netlify/functions/ai"
  to = "/.netlify/functions/ai"
  status = 200

# Catch /service/* — SW intercepts first, this is the fallback
[[redirects]]
  from = "/service/*"
  to = "/index.html"
  status = 200
  force = false

[[headers]]
  for = "/sw.js"
  [headers.values]
    Service-Worker-Allowed = "/"
    Content-Type = "application/javascript"

[[headers]]
  for = "/scram/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/epoxy/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/baremux/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
