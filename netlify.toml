[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/game-proxy"
  to = "/.netlify/functions/game-proxy"
  status = 200

[[redirects]]
  from = "/api/auth"
  to = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from = "/api/auth-codes"
  to = "/.netlify/functions/auth-codes"
  status = 200

[[redirects]]
  from = "/api/ai"
  to = "/.netlify/functions/ai"
  status = 200

[[redirects]]
  from = "/api/chat/send"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/chat/stream"
  to = "/.netlify/functions/chat-stream"
  status = 200

[[redirects]]
  from = "/api/presence"
  to = "/.netlify/functions/presence"
  status = 200

[[redirects]]
  from = "/api/games/list"
  to = "/.netlify/functions/games-list"
  status = 200

[[redirects]]
  from = "/api/games/upload"
  to = "/.netlify/functions/games-upload"
  status = 200

[[redirects]]
  from = "/api/games/delete"
  to = "/.netlify/functions/games-delete"
  status = 200

[[redirects]]
  from = "/bare"
  to = "/.netlify/functions/bare"
  status = 200

[[redirects]]
  from = "/bare/"
  to = "/.netlify/functions/bare"
  status = 200

[[redirects]]
  from = "/bare/*"
  to = "/.netlify/functions/bare"
  status = 200

[[headers]]
  for = "/uv/*"
  [headers.values]
    Service-Worker-Allowed = "/"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/service/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
