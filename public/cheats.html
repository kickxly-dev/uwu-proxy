<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cheats · Uwu Gaming</title>
  <link rel="icon" href="/img/game-icon.svg" />
  <link rel="stylesheet" href="/css/style.css" />
  <script>(function(){var s=localStorage.getItem('uwu_session');if(!s)return location.replace('/login.html');try{var d=JSON.parse(s);if(!d.user||Date.now()-d.loginTime>7*24*60*60*1000){localStorage.removeItem('uwu_session');location.replace('/login.html');}}catch{location.replace('/login.html');}})()</script>
  <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<nav class="sidebar" id="sidebar"></nav>
<main class="page">
  <div class="page-hero">
    <h1 class="page-hero-title">Cheats</h1>
    <p class="page-hero-sub">Blooket tools — use responsibly</p>
  </div>
  <div class="cheats-layout">
    <div class="cheats-frame-wrap">
      <iframe id="blooket-frame" src="about:blank" allowfullscreen allow="fullscreen;autoplay;clipboard-write"></iframe>
    </div>
    <div class="cheats-panel">
      <h3>Blooket Tools</h3>
      <p>Wait for Blooket to fully load, then use these buttons.</p>

      <div style="height:1px;background:var(--border);margin:4px 0"></div>

      <button class="cheat-btn" onclick="injectScript('flood')">Flood Bots</button>
      <button class="cheat-btn" onclick="injectScript('answer')">Auto Answer</button>
      <button class="cheat-btn" onclick="injectScript('tokens')">Token Farm</button>
      <button class="cheat-btn" onclick="injectScript('blooks')">Unlock All Blooks</button>
      <button class="cheat-btn" onclick="injectScript('speed')">Speed Hack</button>

      <div style="height:1px;background:var(--border);margin:4px 0"></div>

      <button class="cheat-btn danger" onclick="reloadFrame()">Reload</button>

      <div class="cheat-status" id="cheat-status">starting proxy…</div>

      <div style="height:1px;background:var(--border);margin:4px 0"></div>
      <p style="font-size:11px;color:var(--text3)">If a security check appears, wait — it completes on its own. Scripts inject into the Blooket frame and only work during a live game (except Blooks).</p>
    </div>
  </div>
</main>

<div class="statusbar">
  <div id="proxy-status" class="proxy-badge loading"><div class="proxy-dot"></div><span id="proxy-status-text">loading</span></div>
  <div class="statusbar-spacer"></div>
  <span class="statusbar-version" id="footer-version"></span>
</div>
<div class="toast-container" id="toast-container"></div>
<script src="/js/main.js" type="module"></script>
<script>
// ── Boot: register SW then load Blooket through UV proxy ──────────────────
(async function() {
  var status = document.getElementById('cheat-status');
  var frame  = document.getElementById('blooket-frame');
  try {
    var reg = await navigator.serviceWorker.register('/uv/sw.js', { scope: '/service/' });

    if (!reg.active) {
      status.textContent = 'installing proxy…';
      await new Promise(function(resolve, reject) {
        var timeout = setTimeout(function() { reject(new Error('proxy install timed out')); }, 15000);
        function watch(worker) {
          worker.addEventListener('statechange', function() {
            if (worker.state === 'activated') { clearTimeout(timeout); resolve(); }
            if (worker.state === 'redundant')  { clearTimeout(timeout); reject(new Error('proxy install failed')); }
          });
        }
        if (reg.installing) { watch(reg.installing); return; }
        if (reg.waiting)    { watch(reg.waiting);    return; }
        reg.addEventListener('updatefound', function() { watch(reg.installing); });
      });
    }

    status.textContent = 'blooket loading — if a security check appears, just wait…';
    frame.src = __uv$config.prefix + __uv$config.encodeUrl('https://www.blooket.com');
  } catch(e) {
    status.textContent = 'proxy error: ' + e.message;
    frame.src = 'https://www.blooket.com';
  }
})();

// ── Cheat scripts ─────────────────────────────────────────────────────────
const SCRIPTS = {
  flood: `
    var amt = prompt("How many bots? (max 100)", "20");
    if (!amt) { void 0; } else {
    amt = Math.min(parseInt(amt)||20, 100);
    var gameCode = prompt("Enter Blooket game code:");
    if (!gameCode) { void 0; } else {
    var names = ["xXProGamer","NotARobot","TotallyHuman","BlooketBot","GigaChad","NPC"+Math.floor(Math.random()*9999)];
    var statusEl = window.parent && window.parent.document.getElementById('cheat-status');
    var joined = 0;
    async function joinOne(n) {
      try {
        var r = await fetch("https://fb.blooket.com/c/SFuBbV5nxv9V1pFd8q4c/joinGame",{
          method:"PUT", headers:{"Content-Type":"application/json"},
          body:JSON.stringify({gameCode:gameCode, name:names[n%names.length]+"_"+n})
        });
        if(r.ok) joined++;
      } catch(e){}
    }
    for(var i=0;i<amt;i++) joinOne(i);
    setTimeout(function(){ if(statusEl) statusEl.textContent = "sent "+amt+" bots (joined: "+joined+")"; }, 2000);
    }}
  `,
  answer: `
    var statusEl = window.parent && window.parent.document.getElementById('cheat-status');
    if(statusEl) statusEl.textContent = 'auto-answer running…';
    if(window.__answerInterval) clearInterval(window.__answerInterval);
    window.__answerInterval = setInterval(function(){
      var btns = Array.from(document.querySelectorAll('[class*="AnswerBtn"],[class*="answerBtn"],[class*="answer"],[class*="Answer"],[class*="option"],[class*="Option"]'));
      if(!btns.length) return;
      var correct = btns.find(function(b){
        return (b.style.background||'').includes('green') || (b.className||'').toLowerCase().includes('correct');
      });
      (correct || btns[0]).click();
    }, 400);
  `,
  tokens: `
    var statusEl = window.parent && window.parent.document.getElementById('cheat-status');
    var added = 0;
    if(window.__tokenInterval) clearInterval(window.__tokenInterval);
    window.__tokenInterval = setInterval(function(){
      var btns = Array.from(document.querySelectorAll('[class*="Token"],[class*="token"],[class*="Coin"],[class*="coin"]'));
      btns.forEach(function(b){ try{b.click();added++;}catch(e){} });
      if(statusEl && added%20===0 && added>0) statusEl.textContent = 'tokens clicked: '+added;
    }, 250);
    if(statusEl) statusEl.textContent = 'token farm active';
  `,
  blooks: `
    var statusEl = window.parent && window.parent.document.getElementById('cheat-status');
    try {
      var ALL_BLOOKS = ["Frog","Cat","Dog","Owl","Sloth","Panda","Deer","Narwhal","Bunny","Bear",
        "Fox","Hamster","Horse","Chick","Elephant","Pig","Hedgehog","Baby Dragon","Duck","Bat",
        "Crab","Ghost","Shark","Whale","Spider","Mummy","Zombie","Werewolf","Vampire","Tim",
        "Snowman","Elf","Reindeer","Santa Claus","Baby Penguin","Baby Chick","Baby Duck",
        "Ice Cube","Love Bug","Cupid","Leprechaun","Trophy","Sunflower","Bumblebee",
        "Caterpillar","Leaf","Ladybug","Rainbow","Thunderbolt","Globe","Rocket","UFO",
        "Planet","Astronaut","Comet","Moon","Star","Sun","Cloud","Raindrop","Snowflake",
        "Fossil","Crystal","Diamond","Gem","Gold Bar","Coin","Bill","Raven","Bats",
        "Black Cat","Cauldron","Spiderella","Lovely","King","Queen"];
      var raw = localStorage.getItem('userData');
      if (!raw) { if(statusEl) statusEl.textContent = 'blooks: log in to Blooket first'; }
      else {
        var data = JSON.parse(raw);
        if (!data.blooks) data.blooks = {};
        ALL_BLOOKS.forEach(function(b){ if(!data.blooks[b]) data.blooks[b] = 1; });
        localStorage.setItem('userData', JSON.stringify(data));
        if(statusEl) statusEl.textContent = 'blooks unlocked! refresh the Blooket page';
      }
    } catch(e) { if(statusEl) statusEl.textContent = 'blooks error: ' + e.message; }
  `,
  speed: `
    var statusEl = window.parent && window.parent.document.getElementById('cheat-status');
    if(!window.__speedActive){
      window.__speedActive = true;
      var _st = window.setTimeout, _si = window.setInterval;
      window.setTimeout  = function(fn,ms){ return _st(fn, Math.min(ms||0, 1)); };
      window.setInterval = function(fn,ms){ return _si(fn, Math.max(Math.min(ms||0,50),16)); };
    }
    if(statusEl) statusEl.textContent = 'speed hack active';
  `,
};

function injectScript(name) {
  var frame  = document.getElementById('blooket-frame');
  var status = document.getElementById('cheat-status');
  if (!frame || !frame.contentWindow) { status.textContent = 'frame not ready'; return; }
  try {
    frame.contentWindow.eval(SCRIPTS[name] || '');
    if (name !== 'flood') status.textContent = name + ' injected!';
  } catch(e) {
    status.textContent = 'not ready — wait for Blooket to fully load';
    console.warn('inject error:', e);
  }
}

function reloadFrame() {
  var frame = document.getElementById('blooket-frame');
  if (!frame) return;
  document.getElementById('cheat-status').textContent = 'reloading…';
  try { frame.src = __uv$config.prefix + __uv$config.encodeUrl('https://www.blooket.com'); }
  catch(e) { frame.src = 'https://www.blooket.com'; }
}
</script>
</body>
</html>
