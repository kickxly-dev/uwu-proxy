<script>
  const session = JSON.parse(localStorage.getItem("uwu_session") || "{}");
  document.getElementById("nav-user").textContent = session.user || "";
  document.getElementById("logout-btn")?.addEventListener("click", () => { localStorage.removeItem("uwu_session"); location.replace("/login.html"); });

  const STREAMING = [
    { name: "Netflix",        url: "https://netflix.com/",              desc: "Movies & TV shows",      bg: "#e50914" },
    { name: "Hulu",           url: "https://hulu.com/",                 desc: "Stream live & on demand",bg: "#1ce783" },
    { name: "HBO Max",        url: "https://max.com/",                  desc: "HBO, DC, and more",      bg: "#5822b4" },
    { name: "Disney+",        url: "https://disneyplus.com/",           desc: "Disney, Marvel, Star Wars",bg:"#113ccf" },
    { name: "Prime Video",    url: "https://primevideo.com/",           desc: "Amazon's streaming",     bg: "#00a8e0" },
    { name: "Peacock",        url: "https://peacocktv.com/",            desc: "NBC Universal content",  bg: "#ff5f00" },
    { name: "Crunchyroll",    url: "https://crunchyroll.com/",          desc: "Anime streaming",        bg: "#f47521" },
    { name: "Paramount+",     url: "https://paramountplus.com/",        desc: "Paramount content",      bg: "#0064ff" },
  ];

  const FREE = [
    { name: "Tubi",           url: "https://tubitv.com/",               desc: "Free movies & TV",       bg: "#fa4928" },
    { name: "Pluto TV",       url: "https://pluto.tv/",                 desc: "Free live TV & VOD",     bg: "#fff04d" },
    { name: "Plex",           url: "https://watch.plex.tv/",            desc: "Free streaming + more",  bg: "#e5a00d" },
    { name: "Kanopy",         url: "https://kanopy.com/",               desc: "Library-powered films",  bg: "#2c5f2e" },
    { name: "Popcornflix",    url: "https://www.popcornflix.com/",      desc: "Free full movies",       bg: "#e91e63" },
    { name: "YouTube",        url: "https://youtube.com/",              desc: "Free videos & movies",   bg: "#ff0000" },
  ];

  function faviconUrl(u) { try { return `https://www.google.com/s2/favicons?domain=${new URL(u).hostname}&sz=64`; } catch { return ""; } }
  function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function renderGrid(id, list) {
    document.getElementById(id).innerHTML = list.map(a => `
      <div class="app-card" onclick="navigate('${escHtml(a.url)}')">
        <div class="app-icon" style="background:${a.bg}18;border:1px solid ${a.bg}35"><img src="${faviconUrl(a.url)}" alt="${escHtml(a.name)}" loading="lazy" onerror="this.style.opacity=0"/></div>
        <div class="app-name">${escHtml(a.name)}</div>
        <div class="app-desc">${escHtml(a.desc)}</div>
      </div>`).join("");
  }

  window.addEventListener("proxyReady", () => { renderGrid("stream-grid", STREAMING); renderGrid("free-grid", FREE); });
</script>
