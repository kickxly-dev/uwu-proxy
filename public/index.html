<script>
  (function() {
    var _s = JSON.parse(localStorage.getItem("uwu_session") || "{}");
    var _sbu = document.getElementById("sb-user");
    var _nu  = document.getElementById("nav-user");
    var _hw  = document.getElementById("hero-welcome");
    if (_s.user) {
      if (_sbu) _sbu.textContent = _s.user.charAt(0).toUpperCase();
      if (_nu)  _nu.textContent  = _s.user;
      if (_hw)  _hw.textContent  = "browse freely, " + _s.user.toLowerCase() + ".";
    }
    // Admin link in sidebar
    if (_s.role === "owner" || _s.role === "slave owner") {
      var al = document.createElement("a");
      al.href = "/admin.html";
      al.className = "sb-btn";
      al.title = "Admin";
      al.style.color = "#f1fa8c";
      al.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>';
      var spacer = document.querySelector(".sb-spacer");
      if (spacer) spacer.parentNode.insertBefore(al, spacer);
    }
    document.getElementById("logout-btn")?.addEventListener("click", function() {
      localStorage.removeItem("uwu_session");
      location.replace("/login.html");
    });
    // Quick links -> proxy navigation
    document.querySelectorAll(".quick-link[data-url]").forEach(function(el) {
      el.addEventListener("click", function() {
        var inp  = document.getElementById("search-input");
        var form = document.getElementById("search-form");
        if (inp && form) {
          inp.value = el.dataset.url;
          form.dispatchEvent(new Event("submit", { bubbles: true, cancelable: true }));
        }
      });
    });
  })();
</script>
