<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uwu Gaming</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  <link rel="stylesheet" href="/css/style.css" />
  <script>(function(){var s=localStorage.getItem('uwu_session');if(!s)return location.replace('/login.html');try{var d=JSON.parse(s);if(!d.user||Date.now()-d.loginTime>7*24*60*60*1000){localStorage.removeItem('uwu_session');location.replace('/login.html');}}catch{location.replace('/login.html');}})()</script>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<span id="nav-user" style="display:none"></span>

<nav class="sidebar" id="sidebar"></nav>

<main class="page">
  <div class="search-section">
    <div class="search-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="search-input" placeholder="Search the web or enter URL…" autocomplete="off" />
      <button class="search-btn" id="search-btn">Go</button>
    </div>
  </div>

  <div class="container">
    <div class="section" id="recent-section">
      <div class="section-header">
        <div class="section-title">Recent</div>
      </div>
      <div id="recent-grid" class="recent-grid"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">Quick Games</div>
        <a href="/games.html" class="section-link">see all →</a>
      </div>
      <div class="quick-grid" id="quick-games"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">Quick Apps</div>
        <a href="/apps.html" class="section-link">see all →</a>
      </div>
      <div class="quick-grid" id="quick-apps"></div>
    </div>
  </div>
</main>

<div class="statusbar">
  <div id="proxy-status" class="proxy-badge loading">
    <div class="proxy-dot"></div>
    <span id="proxy-status-text">loading</span>
  </div>
  <div class="statusbar-spacer"></div>
  <span class="statusbar-version" id="footer-version"></span>
  <button class="statusbar-settings" id="settings-btn" title="Settings">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
</div>

<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Settings</div>
      <button class="modal-close" id="modal-close-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="setting-group">
        <div class="setting-label">Tab Cloak</div>
        <div class="cloak-presets">
          <button class="cloak-preset" data-title="Google" data-icon="https://www.google.com/favicon.ico"><span>🔍</span><span>Google</span></button>
          <button class="cloak-preset" data-title="Canvas" data-icon="https://du11hjcvx0uqb.cloudfront.net/dist/images/favicon-e10d657a73.ico"><span>📚</span><span>Canvas</span></button>
          <button class="cloak-preset" data-title="Khan Academy" data-icon="https://cdn.kastatic.org/images/favicon.ico"><span>🎓</span><span>Khan</span></button>
          <button class="cloak-preset" data-title="New Tab" data-icon=""><span>✕</span><span>Reset</span></button>
        </div>
        <div class="setting-row"><input class="setting-input" id="cloak-title" placeholder="custom tab title" /></div>
        <div class="setting-row"><input class="setting-input" id="cloak-icon" placeholder="custom favicon url" /></div>
        <button class="btn-primary" id="apply-cloak-btn">Apply Cloak</button>
      </div>
      <div class="setting-group">
        <div class="setting-label">Data</div>
        <button class="btn-danger" id="clear-history-btn">Clear All History</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<div id="game-overlay" style="display:none;position:fixed;inset:0;z-index:9999;flex-direction:column;background:#000">
  <div style="display:flex;align-items:center;gap:10px;padding:8px 16px;background:#0d0d1a;border-bottom:1px solid #1e1e3a;flex-shrink:0">
    <button onclick="closeGameOverlay()" style="background:rgba(255,255,255,.08);border:none;color:#fff;padding:6px 16px;border-radius:8px;cursor:pointer;font-family:sans-serif;font-size:13px">← back</button>
    <span id="go-title" style="flex:1;color:#c4c9e8;font-family:sans-serif;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    <button onclick="document.getElementById('go-frame').requestFullscreen()" style="background:rgba(255,255,255,.08);border:none;color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px">⛶ fullscreen</button>
  </div>
  <iframe id="go-frame" style="flex:1;border:none;width:100%;height:100%;display:block" allowfullscreen allow="fullscreen;autoplay;gamepad;clipboard-write" sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-downloads allow-modals allow-top-navigation-by-user-activation"></iframe>
</div>
<script>
function openGameOverlay(url,name){var o=document.getElementById('game-overlay');if(!o)return window.location.href=url;document.getElementById('go-title').textContent=name||'';document.getElementById('go-frame').src=url;o.style.display='flex';document.body.style.overflow='hidden';history.pushState({gameOverlay:true},'',location.href);}
function closeGameOverlay(){var o=document.getElementById('game-overlay');if(!o)return;document.getElementById('go-frame').src='';o.style.display='none';document.body.style.overflow='';}
window.addEventListener('popstate',function(){var o=document.getElementById('game-overlay');if(o&&o.style.display!=='none')closeGameOverlay();});
</script>
<script src="/js/main.js" type="module"></script>
</body>
</html>
