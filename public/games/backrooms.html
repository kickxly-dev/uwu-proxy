<!DOCTYPE html>
<html lang="en-us">
  <head>
    
    
    
    <script src="https://cdn.jsdelivr.net/gh/genizy/assets@main/backrooms/js/main.js"></script>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Backrooms</title>
    <link rel="icon" href="https://cdn.jsdelivr.net/gh/genizy/assets@main/backrooms/img/icon.png" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/genizy/assets@main/backrooms/TemplateData/style.css" />
    <script src="https://cdn.jsdelivr.net/gh/genizy/assets@main/backrooms/TemplateData/UnityProgress.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/genizy/assets@main/backrooms/Build/UnityLoader.js"></script>
    <script>
      var gameInstance = UnityLoader.instantiate("gameContainer", "https://cdn.jsdelivr.net/gh/genizy/assets@main/backrooms/Build/WebGL.json", { onProgress: UnityProgress });
    </script>
  <style>
#sidebarad1,
#sidebarad2 {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 160px;
  height: 600px;
  padding: 0;
  margin: 0;
  z-index: 999999;
}
#sidebarad1 {
  left: 0;
}
#sidebarad2 {
  right: 0;
}
.sidebar-close {
  position: absolute;
  top: 0;
  right: 0;
  width: 22px;
  height: 22px;
  line-height: 22px;
  text-align: center;
  background: rgba(0,0,0,0.7);
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  user-select: none;
  z-index: 10;
}
.sidebar-frame {
  width: 160px;
  height: 600px;
  border: none;
  display: block;
}
</style>
</head>
  <body>
    <div class="webgl-content">
      <div id="gameContainer" style="width: 960px; height: 600px;"></div>
      <div class="footer">
        <div class="webgl-logo"></div>
        <div class="fullscreen" onclick="gameInstance.SetFullscreen(1)"></div>
        <div class="title">Backrooms</div>
      </div>
    </div>
  <div id="sidebarad1">
  <div class="sidebar-close" onclick="this.parentElement.style.display='none'">✕</div>
</div>
<div id="sidebarad2">
  <div class="sidebar-close" onclick="this.parentElement.style.display='none'">✕</div>
</div>
</body>
</html>
