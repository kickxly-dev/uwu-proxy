<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;overflow:hidden}
    iframe{width:100%;height:100%;border:none;display:block}
    .back{position:fixed;top:10px;left:10px;z-index:9999;background:rgba(0,0,0,.75);color:#fff;padding:7px 14px;border-radius:8px;text-decoration:none;font-family:sans-serif;font-size:13px;backdrop-filter:blur(4px)}
    .back:hover{background:rgba(0,0,0,.9)}
    #gf-loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#050510;color:#9aa3c6;font-family:sans-serif;font-size:1rem;z-index:100;pointer-events:none}
    #gf-loading.hidden{display:none}
  </style>
</head>
<body>
  <a href="javascript:history.back()" class="back">← back</a>
  <div id="gf-loading">loading game…</div>
  <iframe id="gf" allowfullscreen allow="fullscreen; autoplay; gamepad; clipboard-write" sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-downloads allow-modals"></iframe>
  <script type="module">
    const GAME_URL = "https://paperio-live.com/";
    const frame  = document.getElementById("gf");
    const loader = document.getElementById("gf-loading");
    import("/uv/uv.bundle.js").then(() => import("/uv/uv.config.js")).then(async () => {
      try {
        const reg = await navigator.serviceWorker.register("/uv/sw.js", {
          scope: __uv$config.prefix,
          updateViaCache: "none",
        });
        if (reg.installing || reg.waiting) await navigator.serviceWorker.ready;
        frame.src = __uv$config.prefix + __uv$config.encodeUrl(GAME_URL);
      } catch {
        frame.src = GAME_URL;
      }
    });
    frame.addEventListener("load",  () => loader.classList.add("hidden"), { once: true });
    frame.addEventListener("error", () => loader.classList.add("hidden"), { once: true });
  </script>
</body>
</html>
