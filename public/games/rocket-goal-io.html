    <script>
    var loadingText = document.querySelector("#loading-text");
    let totalBytes = 0;
    let loadedBytes = 0;

    async function fetchWithProgress(url) {
      const response = await fetch(url);
      const reader = response.body.getReader();
      let chunks = [];
      let received = 0;
      while (true) {
        const {
          done,
          value
        } = await reader.read();
        if (done) break;
        received += value.length;
        loadedBytes += value.length;
        chunks.push(value);
        let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
        let mbTotal = '57.79';
        loadingText.textContent = `LOADING... ${mbDone} MB / ${mbTotal} MB`;
      }
      let fullBuffer = new Uint8Array(received);
      let offset = 0;
      for (let chunk of chunks) {
        fullBuffer.set(chunk, offset);
        offset += chunk.length;
      }
      return fullBuffer.buffer;
    }

    async function mergeFiles(fileParts, cacheKey) {
      const cache = await caches.open("gash-cache");
      const cachedResponse = await cache.match(cacheKey);
      if (cachedResponse) {
        const blob = await cachedResponse.blob();
        return URL.createObjectURL(blob);
      }
      const buffers = await Promise.all(
        fileParts.map(part => fetchWithProgress(part))
      );
      const mergedBlob = new Blob(buffers);
      const response = new Response(mergedBlob);
      await cache.put(cacheKey, response);
      return URL.createObjectURL(mergedBlob);
    }

    function getParts(file, start, end) {
      let parts = [];
      for (let i = start; i <= end; i++) {
        parts.push(file + ".part" + i);
      }
      return parts;
    }
    (async () => {
      const [dataUrl, wasmUrl] = await Promise.all([
        mergeFiles(getParts("Build/2e6b9ad94eed2790c664210defe740da.data.unityweb", 1, 2), "2e6b9ad94eed2790c664210defe740da.data.unityweb"),
        mergeFiles(getParts("Build/f0058840c570f9f85a2e5851e27b0f70.wasm.unityweb", 1, 2), "f0058840c570f9f85a2e5851e27b0f70.wasm.unityweb")
      ]);
      let thegamecanvas = document.querySelector("#unity-canvas");
      let buildUrl = "Build"
      createUnityInstance(thegamecanvas, {
        dataUrl: dataUrl,
        frameworkUrl: buildUrl + "/6f314fe54fd9b4f06bc4efe696cc6531.framework.js.unityweb",
        codeUrl: wasmUrl,
        streamingAssetsUrl: "StreamingAssets",
        companyName: "PocketHaven",
        productName: "RocketGoal",
        productVersion: "0.3091",
      }).then((unityInstance) => {
        loadingText.remove();
      });
    })();
    </script>
