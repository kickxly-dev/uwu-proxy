<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tetris</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;align-items:center;justify-content:center;height:100vh;font-family:monospace;color:#fff}
#wrap{display:flex;gap:24px;align-items:flex-start}
canvas{border:2px solid #333;display:block}
#side{width:120px}
#side h2{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
#next{border:2px solid #333;margin-bottom:16px}
.stat{margin-bottom:12px}
.stat span{display:block;font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px}
.stat strong{font-size:20px;color:#fff}
#msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);z-index:10}
#msg div{text-align:center;padding:32px;border:2px solid #444;background:#111;border-radius:8px}
#msg h1{font-size:28px;margin-bottom:8px}
#msg p{color:#888;margin-bottom:20px;font-size:13px}
#msg button{background:#5865f2;border:none;color:#fff;padding:10px 28px;border-radius:6px;font-size:14px;cursor:pointer;font-family:monospace}
#msg button:hover{background:#4752c4}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="board" width="300" height="600"></canvas>
  <div id="side">
    <h2>Next</h2>
    <canvas id="next" width="120" height="120"></canvas>
    <div class="stat"><span>Score</span><strong id="score">0</strong></div>
    <div class="stat"><span>Level</span><strong id="level">1</strong></div>
    <div class="stat"><span>Lines</span><strong id="lines">0</strong></div>
    <div style="margin-top:16px;font-size:11px;color:#555;line-height:1.6">
      ← → Move<br>↑ Rotate<br>↓ Soft drop<br>Space Hard drop<br>P Pause
    </div>
  </div>
</div>
<div id="msg">
  <div>
    <h1 id="msg-title">Game Over</h1>
    <p id="msg-sub">Press Start to play again</p>
    <button id="msg-btn" onclick="startGame()">Start</button>
  </div>
</div>
<script>
const COLS=10,ROWS=20,SZ=30;
const COLORS=['','#f43f5e','#f97316','#eab308','#22c55e','#06b6d4','#3b82f6','#a855f7'];
const SHAPES=[
  [],
  [[1,1,1,1]],
  [[2,2],[2,2]],
  [[0,3,0],[3,3,3]],
  [[4,0],[4,0],[4,4]],
  [[0,5],[0,5],[5,5]],
  [[6,6,0],[0,6,6]],
  [[0,7,7],[7,7,0]]
];

const bc=document.getElementById('board'),bx=bc.getContext('2d');
const nc=document.getElementById('next'),nx=nc.getContext('2d');

let board,piece,next,score,level,lines,timer,paused,dead;

function newBoard(){return Array.from({length:ROWS},()=>new Array(COLS).fill(0));}
function randPiece(){const t=Math.ceil(Math.random()*7);return{type:t,shape:SHAPES[t].map(r=>[...r]),x:Math.floor(COLS/2)-Math.floor(SHAPES[t][0].length/2),y:0};}

function draw(){
  bx.fillStyle='#0a0a1a';bx.fillRect(0,0,bc.width,bc.height);
  // grid lines
  bx.strokeStyle='#1a1a2e';
  for(let r=0;r<ROWS;r++){bx.beginPath();bx.moveTo(0,r*SZ);bx.lineTo(bc.width,r*SZ);bx.stroke();}
  for(let c=0;c<COLS;c++){bx.beginPath();bx.moveTo(c*SZ,0);bx.lineTo(c*SZ,bc.height);bx.stroke();}
  // board
  board.forEach((row,r)=>row.forEach((v,c)=>{if(v){drawCell(bx,c,r,v,SZ);}}));
  // ghost
  if(piece&&!dead){
    let gy=piece.y;
    while(!collide(piece.shape,piece.x,gy+1))gy++;
    if(gy!==piece.y){
      bx.globalAlpha=0.2;
      piece.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v)drawCell(bx,piece.x+c,gy+r,v,SZ);}));
      bx.globalAlpha=1;
    }
  }
  // current piece
  if(piece){piece.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v)drawCell(bx,piece.x+c,piece.y+r,v,SZ);}));}
  // next
  nx.fillStyle='#0a0a1a';nx.fillRect(0,0,nc.width,nc.height);
  if(next){
    const ns=28,ox=Math.floor((4-next.shape[0].length)/2)*ns+4,oy=Math.floor((4-next.shape.length)/2)*ns+4;
    next.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v)drawCell(nx,c,r,v,ns,ox,oy);}));
  }
}

function drawCell(ctx,c,r,v,sz,ox=0,oy=0){
  ctx.fillStyle=COLORS[v];
  ctx.fillRect(ox+c*sz+1,oy+r*sz+1,sz-2,sz-2);
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.fillRect(ox+c*sz+1,oy+r*sz+1,sz-2,4);
}

function collide(shape,px,py){
  return shape.some((row,r)=>row.some((v,c)=>v&&(py+r>=ROWS||px+c<0||px+c>=COLS||(board[py+r]&&board[py+r][px+c]))));
}

function place(){
  piece.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v&&piece.y+r>=0)board[piece.y+r][piece.x+c]=v;}));
  let cleared=0;
  for(let r=ROWS-1;r>=0;r--){
    if(board[r].every(v=>v)){board.splice(r,1);board.unshift(new Array(COLS).fill(0));cleared++;r++;}
  }
  if(cleared){
    const pts=[0,100,300,500,800][cleared]*level;
    score+=pts;lines+=cleared;
    level=Math.floor(lines/10)+1;
    document.getElementById('score').textContent=score;
    document.getElementById('level').textContent=level;
    document.getElementById('lines').textContent=lines;
  }
  piece=next;next=randPiece();
  if(collide(piece.shape,piece.x,piece.y)){gameOver();}
}

function drop(){
  if(!piece||paused||dead)return;
  if(!collide(piece.shape,piece.x,piece.y+1)){piece.y++;}
  else{place();}
  draw();resetTimer();
}

function resetTimer(){
  clearInterval(timer);
  timer=setInterval(drop,Math.max(80,1000-level*80));
}

function rotate(dir){
  if(!piece||paused||dead)return;
  const rows=piece.shape.length,cols=piece.shape[0].length;
  const rot=Array.from({length:cols},(_,r)=>Array.from({length:rows},(_,c)=>dir>0?piece.shape[rows-1-c][r]:piece.shape[c][cols-1-r]));
  const kicks=[0,-1,1,-2,2];
  for(const k of kicks){if(!collide(rot,piece.x+k,piece.y)){piece.shape=rot;piece.x+=k;break;}}
  draw();
}

function hardDrop(){
  if(!piece||paused||dead)return;
  while(!collide(piece.shape,piece.x,piece.y+1)){piece.y++;score+=2;}
  place();draw();resetTimer();
}

function gameOver(){dead=true;clearInterval(timer);
  document.getElementById('msg-title').textContent='Game Over';
  document.getElementById('msg-sub').textContent='Score: '+score;
  document.getElementById('msg').style.display='flex';
}

function startGame(){
  document.getElementById('msg').style.display='none';
  board=newBoard();score=0;level=1;lines=0;paused=false;dead=false;
  document.getElementById('score').textContent='0';
  document.getElementById('level').textContent='1';
  document.getElementById('lines').textContent='0';
  piece=randPiece();next=randPiece();
  draw();resetTimer();
}

document.addEventListener('keydown',e=>{
  if(dead)return;
  switch(e.code){
    case'ArrowLeft': if(!paused&&piece&&!collide(piece.shape,piece.x-1,piece.y))piece.x--;draw();e.preventDefault();break;
    case'ArrowRight': if(!paused&&piece&&!collide(piece.shape,piece.x+1,piece.y))piece.x++;draw();e.preventDefault();break;
    case'ArrowDown': if(!paused){piece&&!collide(piece.shape,piece.x,piece.y+1)&&piece.y++;draw();e.preventDefault();}break;
    case'ArrowUp': rotate(1);e.preventDefault();break;
    case'Space': hardDrop();e.preventDefault();break;
    case'KeyP': paused=!paused;if(!paused)resetTimer();else clearInterval(timer);break;
    case'KeyZ': rotate(-1);e.preventDefault();break;
  }
});

// Show start screen
document.getElementById('msg-title').textContent='Tetris';
document.getElementById('msg-sub').textContent='Classic block-stacking game';
document.getElementById('msg').style.display='flex';
board=newBoard();draw();
</script>
</body>
</html>
