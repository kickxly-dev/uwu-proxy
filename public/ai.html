    .msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;margin-top:2px;}
    .msg.ai   .msg-avatar{background:linear-gradient(135deg,var(--pink),var(--purple));}
    .msg.user .msg-avatar{background:var(--bg3);border:1px solid var(--border);}
    .msg-bubble{max-width:75%;padding:12px 16px;border-radius:18px;font-size:.9rem;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
    .msg.ai   .msg-bubble{background:var(--bg2);border:1px solid var(--border);border-top-left-radius:4px;}
    .msg.user .msg-bubble{background:linear-gradient(135deg,rgba(255,121,198,.2),rgba(189,147,249,.2));border:1px solid rgba(255,121,198,.25);border-top-right-radius:4px;}
    .typing .msg-bubble{color:var(--dim);}
    .chat-input-wrap{border-top:1px solid var(--border);background:rgba(5,5,16,.9);backdrop-filter:blur(20px);padding:16px 24px;}
    .chat-input-inner{max-width:800px;margin:0 auto;display:flex;gap:10px;align-items:flex-end;}
    .chat-textarea{flex:1;background:var(--bg3);border:1.5px solid var(--border);border-radius:20px;padding:12px 18px;color:var(--text);font-family:var(--ff-body);font-size:.9rem;resize:none;outline:none;max-height:160px;line-height:1.5;transition:border-color .2s;}
    .chat-textarea:focus{border-color:var(--pink);}
    .chat-textarea::placeholder{color:var(--muted);}
    .chat-send{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),var(--purple));border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:opacity .2s,transform .15s;box-shadow:0 2px 12px rgba(255,121,198,.3);}
    .chat-send:hover{opacity:.88;transform:scale(1.05);}
    .chat-send:disabled{opacity:.3;pointer-events:none;}
    .chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--dim);text-align:center;padding:40px;}
    .chat-empty-icon{font-size:3rem;opacity:.5;}
    .chat-empty-title{font-family:var(--ff-display);font-size:1.2rem;color:var(--text);}
  </style>

<script>
  // Session display
  const session = JSON.parse(localStorage.getItem("uwu_session") || "{}");
  const navUser = document.getElementById("nav-user");
  if (navUser && session.user) navUser.textContent = session.user;
  document.getElementById("logout-btn")?.addEventListener("click", () => {
    localStorage.removeItem("uwu_session");
    location.replace("/login.html");
  });

  // Chat
  const messages = [];
  const chatEl   = document.getElementById("chat-messages");
  const inputEl  = document.getElementById("chat-input");
  const sendBtn  = document.getElementById("chat-send");
  const emptyEl  = document.getElementById("chat-empty");

  function addMsg(role, text) {
    emptyEl?.remove();
    const wrap = document.createElement("div");
    wrap.className = `msg ${role}`;
    const initial = role === "ai" ? "AI" : (session.user || "U")[0].toUpperCase();
    wrap.innerHTML = `
      <div class="msg-avatar">${initial}</div>
      <div class="msg-bubble">${escHtml(text)}</div>`;
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
    return wrap;
  }

  function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendBtn.click(); }
  });
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px";
  });

  sendBtn.addEventListener("click", async () => {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = "";
    inputEl.style.height = "auto";

    messages.push({ role: "user", content: text });
    addMsg("user", text);

    const typingEl = addMsg("ai", "...");
    typingEl.classList.add("typing");
    sendBtn.disabled = true;

    try {
      const res = await fetch("/api/ai", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ messages }),
      });
      const data = await res.json();
      typingEl.remove();

      if (!res.ok) {
        const err = data?.error?.message || data?.error || JSON.stringify(data);
        addMsg("ai", typeof err === "string" ? err : "something went wrong");
      } else {
        let reply = data.choices?.[0]?.message?.content;
        if (typeof reply !== "string") reply = JSON.stringify(reply) || "no response";
        if (!reply) reply = "no response";
        messages.push({ role: "assistant", content: reply });
        addMsg("ai", reply);
      }
    } catch (e) {
      typingEl.remove();
      addMsg("ai", "connection error — try again");
    }
    sendBtn.disabled = false;
    inputEl.focus();
  });
</script>
