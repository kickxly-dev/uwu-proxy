<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>game · uwu proxy</title>
  <script>(function(){var s=localStorage.getItem("uwu_session");if(!s)return location.replace("/login.html");try{var d=JSON.parse(s);if(!d.user||Date.now()-d.loginTime>7*24*60*60*1000){localStorage.removeItem("uwu_session");location.replace("/login.html");}}catch{location.replace("/login.html");}})()</script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;overflow:hidden}
    iframe{width:100%;height:100%;border:none;display:block}
    .back{position:fixed;top:10px;left:10px;z-index:9999;background:rgba(0,0,0,.75);color:#fff;padding:7px 14px;border-radius:8px;font-family:sans-serif;font-size:13px;backdrop-filter:blur(4px);cursor:pointer;border:none;transition:background .15s}
    .back:hover{background:rgba(0,0,0,.92)}
    #gf-loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#050510;color:#9aa3c6;font-family:sans-serif;font-size:1rem;z-index:100;pointer-events:none}
    #gf-loading.hidden{display:none}
  </style>
</head>
<body>
  <button class="back" onclick="history.back()">← back</button>
  <div id="gf-loading">loading game…</div>
  <iframe id="gf" allowfullscreen allow="fullscreen; autoplay; gamepad; clipboard-write"></iframe>
  <script type="module">
    const p = new URLSearchParams(location.search);
    const u = p.get("url");
    const n = p.get("name");
    const isDirect = p.get("direct") === "1";
    const loader = document.getElementById("gf-loading");
    const frame  = document.getElementById("gf");

    if (!u) { location.replace("/games.html"); throw new Error("stop"); }

    let parsed;
    try {
      parsed = new URL(u);
      if (parsed.protocol !== "https:" && parsed.protocol !== "http:") throw new Error("bad protocol");
    } catch {
      location.replace("/games.html");
      throw new Error("stop");
    }

    document.title = (n ? n.slice(0, 80) + " · " : "") + "uwu proxy";

    if (isDirect) {
      // Game is already embeddable — skip the service worker entirely for instant load.
      frame.src = parsed.href;
    } else {
      // Register the UV service worker so it can strip X-Frame-Options / CSP
      // frame-ancestors headers, then point the iframe at the proxied URL.
      import("/uv/uv.bundle.js").then(() => import("/uv/uv.config.js")).then(async () => {
        try {
          const reg = await navigator.serviceWorker.register("/uv/sw.js", {
            scope: __uv$config.prefix,
            updateViaCache: "none",
          });
          if (reg.installing || reg.waiting) {
            await navigator.serviceWorker.ready;
          }
          frame.src = __uv$config.prefix + __uv$config.encodeUrl(parsed.href);
        } catch {
          // Service worker unavailable (e.g. non-HTTPS dev) — fall back to direct src
          frame.src = parsed.href;
        }
      });
    }

    frame.addEventListener("load",  () => loader.classList.add("hidden"), { once: true });
    frame.addEventListener("error", () => loader.classList.add("hidden"), { once: true });
  </script>
</body>
</html>
