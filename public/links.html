    .link-btn:hover{color:var(--text);border-color:rgba(255,255,255,.15);}
    .link-btn.open{background:linear-gradient(135deg,var(--pink),var(--purple));border:none;color:#fff;}
    .link-btn.open:hover{opacity:.85;}
    .status-bar{display:flex;align-items:center;justify-content:center;gap:16px;padding:16px 24px;margin-bottom:8px;font-size:.8rem;color:var(--dim);font-family:var(--ff-mono);}
    .status-bar span{display:flex;align-items:center;gap:6px;}
    .no-subdomain{text-align:center;padding:40px 24px;color:var(--dim);}
    .no-subdomain input{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 16px;color:var(--text);font-family:var(--ff-mono);font-size:.9rem;outline:none;width:100%;max-width:360px;margin:16px auto;display:block;transition:border-color .2s;}
    .no-subdomain input:focus{border-color:var(--pink);}
    .no-subdomain .save-btn{padding:10px 24px;background:linear-gradient(135deg,var(--pink),var(--purple));border:none;border-radius:var(--r);color:#fff;font-family:var(--ff-display);font-weight:700;cursor:pointer;}
  </style>

<main class="page">
  <div class="links-hero">
    <h1 class="links-title">Backup Links</h1>
    <p class="links-sub">if one gets blocked, use another — they all work the same</p>
  </div>

  <div class="status-bar" id="status-bar"></div>
  <div id="links-container"></div>
</main>

<div class="toast-container" id="toast-container"></div>
<script src="/js/main.js" type="module"></script>
<script>
  const session = JSON.parse(localStorage.getItem("uwu_session") || "{}");
  document.getElementById("nav-user").textContent = session.user || "";
  document.getElementById("logout-btn")?.addEventListener("click", () => { localStorage.removeItem("uwu_session"); location.replace("/login.html"); });

  const WORKER_NAMES = [
    "velvet-note-app",
    "amber-tide-hub",
    "cedar-tools-app",
    "maple-stream",
    "cobalt-lens-app",
    "indigo-wave",
    "onyx-path-hub",
    "prism-gate-app",
    "quartz-hub",
    "lunar-stack-app",
  ];

  // Auto-detect the workers.dev subdomain from current hostname
  // e.g. "study-hub-app.kickxly0.workers.dev" → "kickxly0.workers.dev"
  function getSubdomain() {
    const saved = localStorage.getItem("uwu_subdomain");
    if (saved) return saved;
    const h = window.location.hostname;
    if (h.includes(".workers.dev")) {
      const parts = h.split(".");
      // Remove first segment (worker name), keep rest
      return parts.slice(1).join(".");
    }
    return null;
  }

  function saveSubdomain(sub) {
    localStorage.setItem("uwu_subdomain", sub);
  }

  function buildUrl(name, subdomain) {
    return `https://${name}.${subdomain}`;
  }

  function renderLinks(subdomain) {
    const current = window.location.hostname.split(".")[0];
    const container = document.getElementById("links-container");
    const statusBar  = document.getElementById("status-bar");

    const urls = WORKER_NAMES.map(name => ({ name, url: buildUrl(name, subdomain) }));

    container.innerHTML = `<div class="links-grid">${urls.map(({ name, url }) => {
      const isActive = name === current;
      return `<div class="link-card ${isActive ? "active" : ""}" id="card-${name}">
        <div class="link-left">
          <div class="link-name">${isActive ? "current" : "backup"}</div>
          <div class="link-url">${url}</div>
        </div>
        <div class="link-actions">
          <div class="link-status" id="status-${name}"></div>
          <button class="link-btn" onclick="copyLink('${url}')">copy</button>
          <a class="link-btn open" href="${url}" target="_blank">open</a>
        </div>
      </div>`;
    }).join("")}</div>`;

    statusBar.innerHTML = `
      <span><div style="width:8px;height:8px;border-radius:50%;background:var(--mint);box-shadow:0 0 6px rgba(80,250,123,.5)"></div> online</span>
      <span style="color:var(--muted)">·</span>
      <span>${urls.length} links total</span>
      <span style="color:var(--muted)">·</span>
      <span><a href="#" onclick="resetSubdomain()" style="color:var(--dim);font-size:.75rem">change subdomain</a></span>`;

    // Ping each URL to check if it's up
    urls.forEach(({ name, url }) => {
      fetch(url + "/api/auth", { method: "OPTIONS", signal: AbortSignal.timeout(4000) })
        .then(() => { const el = document.getElementById("status-" + name); if (el) { el.classList.add("up"); } })
        .catch(() => {});
    });
  }

  function showSetup() {
    document.getElementById("links-container").innerHTML = `
      <div class="no-subdomain">
        <div style="font-size:1.1rem;font-weight:600;margin-bottom:8px">Enter your workers.dev subdomain</div>
        <div style="font-size:.85rem;margin-bottom:4px">It's the part after the worker name in your URL.</div>
        <div style="font-size:.82rem;color:var(--muted);margin-bottom:16px">e.g. if your URL is <code style="color:var(--pink)">study-hub-app.kickxly0.workers.dev</code><br>enter <code style="color:var(--pink)">kickxly0.workers.dev</code></div>
        <input id="sub-input" type="text" placeholder="yourname.workers.dev" autocomplete="off"/>
        <br/>
        <button class="save-btn" onclick="saveSub()">Save</button>
      </div>`;
  }

  function saveSub() {
    const val = document.getElementById("sub-input")?.value.trim();
    if (!val || !val.includes(".workers.dev")) {
      alert("Enter in format: yourname.workers.dev");
      return;
    }
    saveSubdomain(val);
    renderLinks(val);
  }

  function resetSubdomain() {
    localStorage.removeItem("uwu_subdomain");
    showSetup();
    return false;
  }

  function copyLink(url) {
    navigator.clipboard.writeText(url).then(() => {
      const c = document.getElementById("toast-container");
      if (!c) return;
      const el = document.createElement("div");
      el.className = "toast success";
      el.innerHTML = "<span>✓</span><span>copied</span>";
      c.appendChild(el);
      setTimeout(() => { el.style.animation = "toastOut .3s ease forwards"; setTimeout(() => el.remove(), 300); }, 2000);
    });
  }

  const sub = getSubdomain();
  if (sub) renderLinks(sub);
  else showSetup();
</script>

    </svg>
  </button>
</div>

</script>
