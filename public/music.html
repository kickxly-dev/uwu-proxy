<script>
  const session = JSON.parse(localStorage.getItem("uwu_session") || "{}");
  const navUser = document.getElementById("nav-user");
  if (navUser && session.user) navUser.textContent = session.user;
  document.getElementById("logout-btn")?.addEventListener("click", () => { localStorage.removeItem("uwu_session"); location.replace("/login.html"); });

  const MUSIC_APPS = [
    { name: "Spotify",       url: "https://open.spotify.com/",       desc: "Stream music & podcasts",   bg: "#1db954" },
    { name: "YouTube Music", url: "https://music.youtube.com/",      desc: "YouTube's music platform",  bg: "#ff0000" },
    { name: "SoundCloud",    url: "https://soundcloud.com/",         desc: "Discover & share tracks",   bg: "#ff5500" },
    { name: "Apple Music",   url: "https://music.apple.com/",        desc: "Apple's music streaming",   bg: "#fc3c44" },
    { name: "Tidal",         url: "https://tidal.com/",              desc: "Hi-fi music streaming",     bg: "#000000" },
    { name: "Pandora",       url: "https://www.pandora.com/",        desc: "Radio & on-demand music",   bg: "#005483" },
    { name: "Deezer",        url: "https://www.deezer.com/",         desc: "Millions of tracks",        bg: "#a238ff" },
    { name: "Amazon Music",  url: "https://music.amazon.com/",       desc: "Amazon's music platform",   bg: "#ff9900" },
  ];

  function faviconUrl(u) { try { return `https://www.google.com/s2/favicons?domain=${new URL(u).hostname}&sz=64`; } catch { return ""; } }
  function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  window.addEventListener("proxyReady", () => {
    const grid = document.getElementById("music-grid");
    grid.innerHTML = MUSIC_APPS.map(a => `
      <div class="app-card" onclick="navigate('${escHtml(a.url)}')">
        <div class="app-icon" style="background:${a.bg}18;border:1px solid ${a.bg}35"><img src="${faviconUrl(a.url)}" alt="${escHtml(a.name)}" loading="lazy" onerror="this.style.opacity=0"/></div>
        <div class="app-name">${escHtml(a.name)}</div>
        <div class="app-desc">${escHtml(a.desc)}</div>
      </div>`).join("");
  });

  function playAudio() {
    const url = document.getElementById("audio-url").value.trim();
    if (!url) return;
    const player = document.getElementById("audio-player");
    player.src = url;
    player.play();
  }
</script>
