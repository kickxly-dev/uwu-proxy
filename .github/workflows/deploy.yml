name: Deploy to all platforms

on:
  push:
    branches: [master]

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

jobs:
  deploy-cloudflare:
    name: Cloudflare Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - name: Deploy workers (retry transient failures)
        run: |
          set -euo pipefail
          deploy_with_retry() {
            local worker="$1"
            local attempts=3
            local delay=10
            for attempt in $(seq 1 "$attempts"); do
              if npx wrangler deploy --name "$worker"; then
                return 0
              fi
              if [ "$attempt" -lt "$attempts" ]; then
                echo "Deploy failed for $worker (attempt $attempt/$attempts). Retrying in ${delay}s..."
                sleep "$delay"
              fi
            done
            echo "Deploy failed for $worker after $attempts attempts."
            return 1
          }
          for worker in \
            velvet-note-app \
            amber-tide-hub \
            cedar-tools-app \
            maple-stream \
            cobalt-lens-app \
            indigo-wave \
            onyx-path-hub \
            prism-gate-app \
            quartz-hub \
            lunar-stack-app
          do
            deploy_with_retry "$worker" || exit 1
          done
